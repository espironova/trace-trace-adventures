      # ─── FIX O: Convert .avif images to .jpg ────────────────────────────────
      # Next.js 15's sharp cannot process certain HEIF-encoded .avif files
      # (e.g. mt-kenya.avif) — throws "Bitstream not supported" and kills the
      # entire build. Convert all .avif assets to .jpg before npm install so
      # Next.js never encounters them. imagemagick is pre-installed on ubuntu-latest.
      - name: "Fix O — Convert .avif images to .jpg"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          find src public -name "*.avif" \
            -not -path "*/node_modules/*" | while read -r f; do
            jpg="${f%.avif}.jpg"
            if convert "$f" "$jpg" 2>/dev/null; then
              rm "$f"
              echo "Converted: $f → $jpg"
            else
              echo "WARNING: Could not convert $f — removing to prevent build failure"
              rm "$f"
            fi
          done
          # Update all import/src references from .avif to .jpg in source files
          find src -type f \( -name "*.tsx" -o -name "*.ts" -o -name "*.css" -o -name "*.js" \) \
            -not -path "*/node_modules/*" | xargs -r sed -i 's/\.avif/.jpg/g'
          echo "Fix O complete — .avif files converted to .jpg"

      # ─── FIX P: Guard browser-only APIs for SSR ─────────────────────────────
      # localStorage, sessionStorage, and window are not defined during SSR.
      # Any component that calls these at module/render level crashes prerendering.
      # This step wraps bare localStorage/sessionStorage/window calls in a
      # typeof window !== 'undefined' guard so they are skipped on the server.
      - name: "Fix P — Guard localStorage/sessionStorage/window for SSR"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (['node_modules', '.next', 'dist', 'app'].includes(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (/\.(tsx|ts)$/.test(entry.name)) processFile(full);
            }
          }

          function processFile(file) {
            let src = fs.readFileSync(file, 'utf8');
            const orig = src;

            // Pattern 1: const x = localStorage.getItem(...)
            // → const x = typeof window !== 'undefined' ? localStorage.getItem(...) : null
            src = src.replace(
              /\b(const|let|var)\s+(\w+)\s*=\s*(localStorage|sessionStorage)\.(\w+)\(([^)]*)\)/g,
              (match, decl, varName, storage, method, args) => {
                const fallback = method === 'getItem' ? 'null' : 'undefined';
                return decl + ' ' + varName + " = typeof window !== 'undefined' ? " + storage + '.' + method + '(' + args + ') : ' + fallback;
              }
            );

            // Pattern 2: localStorage.setItem(...) or localStorage.removeItem(...) as a statement
            // → if (typeof window !== 'undefined') localStorage.setItem(...)
            src = src.replace(
              /^([ \t]*)(localStorage|sessionStorage)\.(setItem|removeItem|clear)\(/gm,
              (match, indent, storage, method) => {
                return indent + "if (typeof window !== 'undefined') " + storage + '.' + method + '(';
              }
            );

            // Pattern 3: window.location, window.open, window.addEventListener at statement level
            // → if (typeof window !== 'undefined') window.xxx
            src = src.replace(
              /^([ \t]*)(window\.(location|open|addEventListener|removeEventListener|scrollTo|scroll)\b)/gm,
              (match, indent, expr) => {
                return indent + "if (typeof window !== 'undefined') " + expr;
              }
            );

            // Pattern 4: bare location.href, location.pathname etc (without window.)
            // These crash SSR with "location is not defined"
            // Safe rewrite: location.xxx → (typeof window !== 'undefined' ? location.xxx : '')
            // Must NOT match when already inside a typeof window check
            src = src.replace(
              /(?<!typeof window !== ['"]undefined['"] \? )(?<!window\.)location\.(href|pathname|search|hash|host|hostname|origin|protocol)(?!\s*=\s*`)/g,
              (match, prop) => {
                return "(typeof window !== 'undefined' ? location." + prop + " : '')";
              }
            );

            // Pattern 5: assignment to location.href = ... (navigation)
            // window.location.href = url  →  if (typeof window !== 'undefined') window.location.href = url
            src = src.replace(
              /^([ \t]*)(?:window\.)?location\.href\s*=/gm,
              (match, indent) => {
                return indent + "if (typeof window !== 'undefined') location.href =";
              }
            );

            if (src !== orig) {
              fs.writeFileSync(file, src);
              console.log('Fix P — SSR-guarded browser APIs in: ' + file);
            }
          }

          walk('src');
          NODEJS

      # ─── FIX P2: Auto-detect shared component localStorage usage ────────────
      # If localStorage is called inside a shared component (e.g. Navigation,
      # a hook, or a provider) that is imported by EVERY page, Fix P's per-file
      # rewrite won't help because the call site is in a dependency.
      # This step scans src/components and src/hooks for localStorage usage,
      # then writes /tmp/localStorage-components.txt for diagnostic purposes
      # and wraps any TOP-LEVEL (non-function-body) localStorage calls it finds.
      - name: "Fix P2 — Wrap top-level localStorage in shared components"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          function walk(dir) {
            if (!fs.existsSync(dir)) return [];
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (['node_modules', '.next', 'dist'].includes(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) results.push(...walk(full));
              else if (/\.(tsx|ts)$/.test(entry.name)) results.push(full);
            }
            return results;
          }

          const dirsToScan = ['src/components', 'src/hooks', 'src/lib', 'src/context'];
          const affected = [];

          for (const dir of dirsToScan) {
            for (const file of walk(dir)) {
              const src = fs.readFileSync(file, 'utf8');
              if (!src.includes('localStorage') && !src.includes('sessionStorage')) continue;

              // Check if localStorage is used OUTSIDE of function bodies
              // by looking for it at the module's top level (before any function declaration)
              const lines = src.split('\n');
              let inFunction = 0;
              let hasTopLevel = false;
              for (const line of lines) {
                const opens = (line.match(/\{/g) || []).length;
                const closes = (line.match(/\}/g) || []).length;
                if (inFunction === 0 && (line.includes('localStorage') || line.includes('sessionStorage'))) {
                  hasTopLevel = true;
                }
                inFunction += opens - closes;
                if (inFunction < 0) inFunction = 0;
              }

              if (hasTopLevel) {
                affected.push(file);
                console.log('Found top-level localStorage in: ' + file);

                // Wrap the specific lines
                let newSrc = src;
                newSrc = newSrc.replace(
                  /^([ \t]*(?:const|let|var)\s+\w+\s*=\s*(?:localStorage|sessionStorage)\.\w+\([^)]*\))/gm,
                  (match, stmt) => {
                    if (match.includes("typeof window")) return match;
                    const varMatch = stmt.match(/(?:const|let|var)\s+(\w+)\s*=/);
                    const varName = varMatch ? varMatch[1] : null;
                    if (varName) {
                      const storage = stmt.includes('sessionStorage') ? 'sessionStorage' : 'localStorage';
                      const methodMatch = stmt.match(/\.(getItem|setItem|removeItem|clear|key|length)\(/);
                      const method = methodMatch ? methodMatch[1] : 'getItem';
                      const fallback = ['getItem', 'key'].includes(method) ? 'null' : 'undefined';
                      return stmt.replace(
                        /(localStorage|sessionStorage)\./,
                        "typeof window !== 'undefined' ? $1."
                      ).replace(/(\([^)]*\))$/, '$1 : ' + fallback);
                    }
                    return match;
                  }
                );

                if (newSrc !== src) {
                  fs.writeFileSync(file, newSrc);
                  console.log('Fixed top-level localStorage in: ' + file);
                }
              }
            }
          }

          if (affected.length === 0) {
            console.log('No top-level localStorage found in shared components');
          }
          NODEJS

      # ─── FIX Q: Force non-SEO pages to client-only rendering ────────────────
      # Pages like /admin, /qr use localStorage at module level in ways that
      # Fix P's regex cannot safely rewrite. These pages don't need Google to
      # index them so we render them client-side only.
      #
      # Next.js rule: ssr:false is ONLY allowed in 'use client' files.
      # Solution: create a _nossr.tsx ('use client') that wraps _client.tsx
      # with dynamic(ssr:false), then have page.tsx (server component) import
      # _nossr.tsx instead of _client.tsx directly.
      - name: "Fix Q — Force admin/qr pages to client-only (noSSR)"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          // Pages that should never SSR — admin panels, QR tools, etc.
          // Also includes pages where a shared component calls localStorage.
          // SEO-critical pages (/, /services, /destinations, /about, /contact)
          // are excluded so Google can still read their content.
          const CLIENT_ONLY_DIRS = [
            'src/app/admin',
            'src/app/qr',
            'src/app/qr-landing',
            'src/app/blogs-reviews',
            'src/app/fleet',
            'src/app/blog-detail',
            'src/app/about',
            'src/app/contact',
            'src/app/services',
            'src/app/portfolio',
          ];

          for (const pageDir of CLIENT_ONLY_DIRS) {
            const pagePath   = path.join(pageDir, 'page.tsx');
            const clientPath = path.join(pageDir, '_client.tsx');
            const nossrPath  = path.join(pageDir, '_nossr.tsx');

            if (!fs.existsSync(pagePath)) {
              console.log('Skipping (not found): ' + pagePath);
              continue;
            }

            // Read existing page.tsx to find client component name and metadata
            const pageSrc = fs.readFileSync(pagePath, 'utf8');

            // Extract the client component name from the import line
            // e.g. import { AdminClient } from './_client'
            const clientImportMatch = pageSrc.match(
              /import\s*\{\s*(\w+)\s*\}\s*from\s*['"]\.\/_client['"]/
            );
            if (!clientImportMatch) {
              console.log('No _client import in ' + pagePath + ' — skipping');
              continue;
            }
            const clientName  = clientImportMatch[1];   // e.g. AdminClient
            const nossrName   = clientName + 'NoSSR';   // e.g. AdminClientNoSSR

            // Extract page function name
            const fnMatch = pageSrc.match(/export default function (\w+)/);
            const pageFnName = fnMatch ? fnMatch[1] : 'Page';

            // Extract metadata block if present (must stay in server component)
            const metaMatch = pageSrc.match(
              /(import type \{ Metadata \} from 'next'\n)?(export const metadata[^}]+\})/s
            );
            const metadataImport = metaMatch ? "import type { Metadata } from 'next'\n" : '';
            const metadataBlock  = metaMatch ? metaMatch[2] : '';

            // ── Write _nossr.tsx ('use client') ──────────────────────────
            // This is the ONLY file allowed to use ssr:false
            fs.writeFileSync(nossrPath, [
              "'use client'",
              "import dynamic from 'next/dynamic'",
              '',
              '// Disable SSR for this page — uses localStorage at module level',
              "const " + clientName + "Dynamic = dynamic(",
              "  () => import('./_client').then(m => ({ default: m." + clientName + " })),",
              "  { ssr: false }",
              ")",
              '',
              'export function ' + nossrName + '() {',
              '  return <' + clientName + 'Dynamic />',
              '}',
              '',
            ].join('\n'));

            // ── Rewrite page.tsx (server component) ──────────────────────
            // Import from _nossr instead of _client, keep metadata
            fs.writeFileSync(pagePath, [
              metadataImport + "import { " + nossrName + " } from './_nossr'",
              '',
              metadataBlock ? metadataBlock + '\n' : '',
              'export default function ' + pageFnName + '() {',
              '  return <' + nossrName + ' />',
              '}',
              '',
            ].filter(Boolean).join('\n'));

            console.log('Fix Q — created _nossr.tsx and rewrote page.tsx for: ' + pageDir);
          }
          NODEJS

      # ─── 6. INSTALL DEPENDENCIES ─────────────────────────────────────────────
      - name: Install dependencies
        if: steps.check_flag.outputs.enabled == 'true'
        run: npm install

      # ─── 7. VALIDATE BUILD ───────────────────────────────────────────────────
      - name: Build validation
        if: steps.check_flag.outputs.enabled == 'true'
        run: npm run build

      # ─── 8. CONFIGURE GIT ────────────────────────────────────────────────────
      - name: Configure Git
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


      # ─── 9. PUSH TO nextjs-deploy ────────────────────────────────────────────
      - name: Push to nextjs-deploy branch
        if: steps.check_flag.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -B nextjs-deploy
          # Final safety net — explicitly remove .next/ from staging even if
          # gitignore was already applied. Belt AND braces.
          git rm -r --cached .next/ 2>/dev/null || true
          git rm -r --cached node_modules/ 2>/dev/null || true
          git add -A
          git reset HEAD .next/ 2>/dev/null || true
          git reset HEAD node_modules/ 2>/dev/null || true
          git commit -m "chore: auto-migrate to Next.js 15 with SSR enabled [$(date +'%Y-%m-%d %H:%M')]" \
            || echo "No changes to commit"
          git push origin nextjs-deploy --force

      # ─── SKIP NOTICE ─────────────────────────────────────────────────────────
      - name: Skip notice
        if: steps.check_flag.outputs.enabled == 'false'
        run: echo "lovable.migrate.json not found — skipping migration for this repo."
