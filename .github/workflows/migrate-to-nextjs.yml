      # ─── FIX I: Replace <img> with next/image ────────────────────────────────
      - name: "Fix I — Migrate <img> tags to next/image"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          const hostnames = new Set();
          let totalReplaced = 0;

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (['node_modules', '.next', 'dist', 'app'].includes(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (/\.tsx$/.test(entry.name)) processFile(full);
            }
          }

          function processFile(file) {
            let src = fs.readFileSync(file, 'utf8');
            const imgRe = /<img\s([^>]*?)\/>/gs;
            let changed = false;

            src = src.replace(imgRe, (match, attrs) => {
              changed = true;
              totalReplaced++;

              const getAttr = (name) => {
                const re = new RegExp('(?:^|\\s)' + name + '=\\{');
                const m = re.exec(attrs);
                if (m) {
                  const openBrace = attrs.indexOf('{', m.index);
                  let depth = 1, i = openBrace + 1;
                  while (i < attrs.length && depth > 0) {
                    if (attrs[i] === '{') depth++;
                    else if (attrs[i] === '}') depth--;
                    i++;
                  }
                  return { value: attrs.slice(openBrace + 1, i - 1).trim(), isExpr: true };
                }
                const strM = attrs.match(new RegExp('(?:^|\\s)' + name + '=["\']([^"\']+)["\']'));
                if (strM) return { value: strM[1].trim(), isExpr: false };
                return { value: '', isExpr: false };
              };

              const srcInfo     = getAttr('src');
              const altInfo     = getAttr('alt');
              const classInfo   = getAttr('className');
              const loadingInfo = getAttr('loading');
              const srcVal     = srcInfo.value;
              const altVal     = altInfo.value;
              const classVal   = classInfo.value;
              const loadingVal = loadingInfo.value;

              const urlMatch = srcVal.match(/https?:\/\/([^/'"]+)/);
              if (urlMatch) hostnames.add(urlMatch[1]);

              const hasExactClass = (cls) => (' ' + classVal + ' ').includes(' ' + cls + ' ');
              const hasArbitraryHeight = /\bh-\[[^\]]+\]/.test(classVal);
              const isFill = (hasExactClass('w-full') && hasExactClass('h-full'))
                          || hasExactClass('h-full')
                          || (hasExactClass('w-full') && hasArbitraryHeight);

              const cleanClass = classVal
                .replace(/(^| )w-full( |$)/g, ' ')
                .replace(/(^| )h-full( |$)/g, ' ')
                .replace(/(^| )h-\[[^\]]+\]( |$)/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();

              const isPriority = loadingVal === 'eager';
              const isBackground = classVal.includes('absolute') || attrs.includes('inset-0')
                || srcVal.startsWith('https://') || srcVal.startsWith('http://');
              const sizes = isBackground
                ? '"100vw"'
                : '"(max-width: 768px) 100vw, (max-width: 1200px) 50vw, 33vw"';

              const srcAttr = srcInfo.isExpr ? 'src={' + srcVal + '}' : 'src={"' + srcVal + '"}';
              const altAttr = altVal
                ? (altInfo.isExpr ? 'alt={' + altVal + '}' : 'alt="' + altVal + '"')
                : 'alt=""';

              if (isFill) {
                const parts = [
                  srcAttr, altAttr, 'fill',
                  cleanClass ? 'className="' + cleanClass + '"' : '',
                  'sizes=' + sizes,
                  isPriority ? 'priority' : '',
                ].filter(Boolean).join('\n          ');
                return '<Image\n          ' + parts + '\n        />';
              } else {
                const parts = [
                  srcAttr, altAttr, 'width={180}', 'height={64}',
                  classVal ? 'className="' + classVal + ' w-auto"' : '',
                  isPriority ? 'priority' : '',
                ].filter(Boolean).join('\n          ');
                return '<Image\n          ' + parts + '\n        />';
              }
            });

            if (changed) {
              if (!src.includes("from 'next/image'") && !src.includes('from "next/image"')) {
                if (/^["']use client["']/.test(src)) {
                  src = src.replace(/^(["']use client["'];?\n)/, "$1import Image from 'next/image'\n");
                } else {
                  src = "import Image from 'next/image'\n" + src;
                }
              }
              fs.writeFileSync(file, src);
              console.log('Migrated img tags in: ' + file);
            }
          }

          walk('src');
          fs.writeFileSync('/tmp/image-hostnames.json', JSON.stringify([...hostnames]));
          console.log('Fix I complete — ' + totalReplaced + ' img tags replaced');
          console.log('External image hostnames: ' + ([...hostnames].join(', ') || 'none'));
          NODEJS

      # ─── FIX L: Convert motion.img → motion(Image) ──────────────────────────
      - name: "Fix L — Convert motion.img carousel images to motion(Image)"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (['node_modules', '.next', 'dist', 'app'].includes(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (/\.tsx$/.test(entry.name)) processFile(full);
            }
          }

          function processFile(file) {
            let src = fs.readFileSync(file, 'utf8');
            if (!src.includes('<motion.img')) return;
            const orig = src;

            src = src.replace(/<motion\.img\n?([\s\S]*?)\/>/g, (match, attrs) => {
              let a = attrs
                .replace(/[ \t]*width=\{[^}]+\}\n?/g, '')
                .replace(/[ \t]*height=\{[^}]+\}\n?/g, '')
                .replace(/[ \t]*width="[^"]*"\n?/g, '')
                .replace(/[ \t]*height="[^"]*"\n?/g, '');

              a = a.replace(/(className=")([^"]*)(")/, (_, open, cls, close) => {
                const cleaned = cls
                  .replace(/(^| )w-full( |$)/g, ' ')
                  .replace(/(^| )h-full( |$)/g, ' ')
                  .replace(/\s+/g, ' ')
                  .trim();
                return cleaned ? open + cleaned + close : '';
              });

              a = a.replace(/\s+$/, '') + '\n          fill\n          sizes="100vw"\n        ';
              return '<MotionImage\n' + a + '/>';
            });

            if (src === orig) return;

            if (!src.includes("from 'next/image'") && !src.includes('from "next/image"')) {
              if (/^["']use client["']/.test(src)) {
                src = src.replace(/^(["']use client["'];?\n)/, "$1import Image from 'next/image'\n");
              } else {
                src = "import Image from 'next/image'\n" + src;
              }
            }

            if (!src.includes('const MotionImage')) {
              const lastImport = src.lastIndexOf('\nimport ');
              if (lastImport !== -1) {
                const eol = src.indexOf('\n', lastImport + 1);
                src = src.slice(0, eol + 1) + '\nconst MotionImage = motion(Image)\n' + src.slice(eol + 1);
              }
            }

            fs.writeFileSync(file, src);
            console.log('Fix L — motion.img → MotionImage: ' + file);
          }

          walk('src');
          NODEJS

      # ─── FIX E: Write next.config.mjs ────────────────────────────────────────
      - name: "Fix E — Write SSR-compatible next.config.mjs"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs = require('fs');

          ['next.config.js', 'next.config.ts', 'next.config.cjs'].forEach(f => {
            if (fs.existsSync(f)) { fs.unlinkSync(f); console.log('Removed stale config: ' + f); }
          });

          let hostnames = [];
          if (fs.existsSync('/tmp/image-hostnames.json')) {
            hostnames = JSON.parse(fs.readFileSync('/tmp/image-hostnames.json', 'utf8'));
          }

          if (fs.existsSync('.env')) {
            const envContent = fs.readFileSync('.env', 'utf8');
            const supabaseMatch = envContent.match(/SUPABASE_URL=["']?(https?:\/\/([^"'\s\n]+))["']?/);
            if (supabaseMatch && supabaseMatch[2]) {
              const hostname = supabaseMatch[2];
              if (!hostnames.includes(hostname)) {
                hostnames.push(hostname);
                console.log('Auto-detected Supabase hostname for remotePatterns: ' + hostname);
              }
            }
          }

          const configLines = [
            '/** @type {import(\'next\').NextConfig} */',
            'const nextConfig = {',
            '  typescript: {',
            '    ignoreBuildErrors: true,',
            '  },',
            '  eslint: {',
            '    ignoreDuringBuilds: true,',
            '  },',
          ];
          if (hostnames.length > 0) {
            configLines.push('  images: {');
            configLines.push('    remotePatterns: [');
            hostnames.forEach(h => {
              configLines.push("      { protocol: 'https', hostname: '" + h + "', pathname: '/**' },");
            });
            configLines.push('    ],');
            configLines.push('  },');
          }
          configLines.push('};', '', 'export default nextConfig;', '');
          fs.writeFileSync('next.config.mjs', configLines.join('\n'));

          console.log('Wrote next.config.mjs' + (hostnames.length ? ' with remotePatterns for: ' + hostnames.join(', ') : ''));
          NODEJS

      # ─── FIX N: Fix Supabase env vars for Next.js ────────────────────────────
      - name: "Fix N — Inline Supabase credentials in client.ts for Next.js compatibility"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs = require('fs');

          if (!fs.existsSync('.env')) {
            console.log('No .env file found — skipping Supabase credential fix');
            process.exit(0);
          }

          const envContent = fs.readFileSync('.env', 'utf8');
          const urlMatch = envContent.match(/VITE_SUPABASE_URL=["']?([^"'\s\n]+)["']?/);
          const keyMatch = envContent.match(/VITE_SUPABASE_PUBLISHABLE_KEY=["']?([^"'\s\n]+)["']?/);

          if (!urlMatch || !keyMatch) {
            console.log('VITE_SUPABASE_URL or VITE_SUPABASE_PUBLISHABLE_KEY not found in .env — skipping');
            process.exit(0);
          }

          const supabaseUrl = urlMatch[1];
          const supabaseKey = keyMatch[1];

          const candidatePaths = [
            'src/integrations/supabase/client.ts',
            'src/lib/supabase.ts',
            'src/lib/supabaseClient.ts',
            'src/supabase/client.ts',
          ];

          for (const p of candidatePaths) {
            if (!fs.existsSync(p)) continue;
            let src = fs.readFileSync(p, 'utf8');
            const orig = src;

            src = src.replace(/import\.meta\.env\.VITE_SUPABASE_URL/g, JSON.stringify(supabaseUrl));
            src = src.replace(/import\.meta\.env\.VITE_SUPABASE_PUBLISHABLE_KEY/g, JSON.stringify(supabaseKey));
            src = src.replace(/process\.env\.VITE_SUPABASE_URL/g, JSON.stringify(supabaseUrl));
            src = src.replace(/process\.env\.VITE_SUPABASE_PUBLISHABLE_KEY/g, JSON.stringify(supabaseKey));

            if (src !== orig) {
              fs.writeFileSync(p, src);
              console.log('Fix N — Inlined Supabase credentials in: ' + p);
            }
          }
          NODEJS

      # ─── FIX J: Generate SEO files ───────────────────────────────────────────
      - name: "Fix J — Generate sitemap.ts and robots.ts"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs = require('fs');

          const cfg = JSON.parse(fs.readFileSync('lovable.migrate.json', 'utf8'));
          const siteUrl = cfg.siteUrl || 'https://example.com';
          if (!cfg.siteUrl) console.warn('WARNING: siteUrl missing from lovable.migrate.json — using placeholder');

          const routeData = JSON.parse(fs.readFileSync('/tmp/routes.json', 'utf8'));
          // Use sitemapPages from lovable.migrate.json if defined — gives full
          // control over which pages appear in sitemap.xml. Excludes /admin,
          // /qr-code, /blog/:id and any other non-indexable routes.
          const paths = cfg.sitemapPages
            ? cfg.sitemapPages
            : routeData.fallback
              ? ['/']
              : (routeData.routes || []).map(r => r.path).filter(p => !p.includes(':'));

          const routeLines = paths.map(p => {
            const priority = p === '/' ? '1.0' : '0.8';
            const freq = p === '/' ? 'weekly' : 'monthly';
            return "    { url: `${baseUrl}" + p + "`, lastModified: new Date().toISOString(), changeFrequency: '" + freq + "', priority: " + priority + ' },';
          });

          const sitemapLines = [
            "import { MetadataRoute } from 'next'",
            '',
            'export default function sitemap(): MetadataRoute.Sitemap {',
            '  const baseUrl = ' + JSON.stringify(siteUrl),
            '  return [',
          ].concat(routeLines).concat([
            '  ]',
            '}',
            '',
          ]);
          fs.writeFileSync('src/app/sitemap.ts', sitemapLines.join('\n'));

          fs.writeFileSync('src/app/robots.ts', [
            "import { MetadataRoute } from 'next'",
            '',
            'export default function robots(): MetadataRoute.Robots {',
            '  return {',
            "    rules: { userAgent: '*', allow: '/' },",
            '    sitemap: ' + JSON.stringify(siteUrl + '/sitemap.xml') + ',',
            '  }',
            '}',
            '',
          ].join('\n'));

          console.log('Fix J complete — sitemap (' + paths.length + ' routes) + robots.ts');
          NODEJS

      # ─── FIX K: Write Next.js vercel.json ───────────────────────────────────
      - name: "Fix K — Write Next.js vercel.json with permanent redirects"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs = require('fs');

          // Baseline 301 redirects — stale/ghost URLs from old WordPress/WooCommerce
          // permanent:true = HTTP 301 → Google removes from index permanently
          const baselineRedirects = [
            { source: '/kids',                         destination: '/', permanent: true },
            { source: '/caps',                         destination: '/', permanent: true },
            { source: '/cart',                         destination: '/', permanent: true },
            { source: '/shop',                         destination: '/', permanent: true },
            { source: '/my-account',                   destination: '/', permanent: true },
            { source: '/checkout',                     destination: '/', permanent: true },
            { source: '/homepage-1',                   destination: '/', permanent: true },
            { source: '/homepage-1/',                  destination: '/', permanent: true },
            { source: '/professional-and-reliability', destination: '/about', permanent: true },
            { source: '/customer-satisfaction',        destination: '/about', permanent: true },
            { source: '/all-posts',                    destination: '/blogs-reviews', permanent: true },
            { source: '/all-posts/:path*',             destination: '/blogs-reviews', permanent: true },
            { source: '/services_group/services',      destination: '/services', permanent: true },
            { source: '/services_group/:path*',        destination: '/services', permanent: true },
            { source: '/services/no-fee',              destination: '/services', permanent: true },
            { source: '/portfolio-2-columns/page/2',   destination: '/', permanent: true },
            { source: '/portfolio-2-columns/:path*',   destination: '/', permanent: true },
            { source: '/category/:path*',              destination: '/', permanent: true },
            { source: '/product-category/:path*',      destination: '/', permanent: true },
            { source: '/product/:path*',               destination: '/', permanent: true },
            { source: '/tag/:path*',                   destination: '/', permanent: true },
          ];

          // Read extra redirects from lovable.migrate.json if defined
          let extraRedirects = [];
          try {
            const cfg = JSON.parse(fs.readFileSync('lovable.migrate.json', 'utf8'));
            if (Array.isArray(cfg.redirects)) {
              extraRedirects = cfg.redirects;
              console.log('Loaded ' + extraRedirects.length + ' extra redirects from lovable.migrate.json');
            }
          } catch(e) {}

          // Merge and deduplicate
          const seen = new Set();
          const redirects = [...baselineRedirects, ...extraRedirects].filter(r => {
            if (seen.has(r.source)) return false;
            seen.add(r.source);
            return true;
          });

          fs.writeFileSync('vercel.json', JSON.stringify({ framework: 'nextjs', redirects }, null, 2));
          console.log('Wrote vercel.json with ' + redirects.length + ' permanent 301 redirects');
          NODEJS

