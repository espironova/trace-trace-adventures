name: Migrate Vite → Next.js and Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ─── 1. CHECKOUT ─────────────────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # ─── 1b. GITIGNORE SETUP ─────────────────────────────────────────────────
      # Add .next/ and node_modules/ to .gitignore BEFORE anything else runs.
      # This must happen before npm install and next build so these directories
      # are never tracked by git. Doing this after the build (Step 8b) was too
      # late — git add -A would already stage the large cache files.
      - name: "Step 1b — Ensure .next/ excluded from git before build"
        run: |
          grep -qxF '.next' .gitignore   || echo '.next'   >> .gitignore
          grep -qxF '.next/' .gitignore  || echo '.next/'  >> .gitignore
          grep -qxF 'node_modules' .gitignore || echo 'node_modules' >> .gitignore
          grep -qxF 'node_modules/' .gitignore || echo 'node_modules/' >> .gitignore
          echo ".next and node_modules added to .gitignore"
          cat .gitignore | grep -E "\.next|node_modules"

      # ─── 2. OPT-IN CHECK ─────────────────────────────────────────────────────
      - name: Check if migration is enabled for this repo
        id: check_flag
        run: |
          if [ -f "lovable.migrate.json" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      # ─── 3. NODE.JS ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        if: steps.check_flag.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ─── 4a. ROUTE EXTRACTION ────────────────────────────────────────────────
      # Parses App.tsx to build a route table. Written to /tmp/routes.json for
      # use by the migration step and Fix J (sitemap).
      # If no routes are found, sets fallback:true — migration will use the old
      # [[...slug]] + ssr:false pattern so no project is left broken.
      - name: "Step 4a — Extract routes from App.tsx"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs = require('fs');

          if (!fs.existsSync('src/App.tsx')) {
            fs.writeFileSync('/tmp/routes.json', JSON.stringify({ fallback: true }));
            console.log('App.tsx not found — will use fallback catch-all');
            process.exit(0);
          }

          const src = fs.readFileSync('src/App.tsx', 'utf8');

          // Build import map: ComponentName → importSrc
          const imports = {};
          for (const m of src.matchAll(/import\s+(\w+)\s+from\s+["']([^"']+)["']/g)) {
            imports[m[1]] = m[2];
          }

          // Extract routes, skip catch-all "*"
          const routes = [];
          for (const m of src.matchAll(/<Route\s+path=["']([^"'*][^"']*|\/?)["']\s+element=\{<(\w+)/g)) {
            const rpath = m[1];
            const component = m[2];
            const importSrc = imports[component] || null;
            if (importSrc) routes.push({ path: rpath, component, importSrc });
          }

          // Find the NotFound component (path="*")
          const nf = src.match(/<Route\s+path=["']\*["']\s+element=\{<(\w+)/);
          const notFound = nf ? { component: nf[1], importSrc: imports[nf[1]] || null } : null;

          if (routes.length === 0) {
            fs.writeFileSync('/tmp/routes.json', JSON.stringify({ fallback: true }));
            console.log('No routes found in App.tsx — will use fallback catch-all');
          } else {
            fs.writeFileSync('/tmp/routes.json', JSON.stringify({ routes, notFound }, null, 2));
            console.log('Extracted ' + routes.length + ' routes from App.tsx');
            routes.forEach(r => console.log('  ' + r.path + ' -> ' + r.component));
          }
          NODEJS

      # ─── 4b-pre: WIPE STALE src/app ─────────────────────────────────────────
      # Lovable commits src/app/[[...slug]]/ and src/app/layout.tsx to main.
      # If these survive into the build they conflict with our generated pages.
      # Using shell rm -rf here (not Node.js) is the most reliable guarantee —
      # it runs unconditionally before the migration Node script.
      - name: "Step 4b-pre — Remove stale src/app from main branch"
        if: steps.check_flag.outputs.enabled == 'true'
        run: rm -rf src/app && echo "Cleared src/app/"

      # ─── 4b. INLINE MIGRATION ────────────────────────────────────────────────
      # Reads /tmp/routes.json. If routes were extracted, generates individual
      # Next.js page files (one per route) — full SSR, Google sees real HTML.
      # Falls back to the old [[...slug]] catch-all ONLY if route extraction
      # completely failed. SSR is now enabled by default (ssr:false removed).
      #
      # FIX 1: next version changed from ^16.0.0 → ^15.3.0 (stable release)
      # FIX 2: ssr:false removed from dynamic() — enables real pre-rendering
      # FIX 3: Fallback catch-all also uses SSR (ssr:false removed there too)
      #
      # Metadata priority: lovable.migrate.json → index.html → "My App"
      - name: "Step 4b — Inline migration: Vite SPA → Next.js App Router"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          // ── Read config ─────────────────────────────────────────────────────
          const cfg = JSON.parse(fs.readFileSync('lovable.migrate.json', 'utf8'));
          let title       = cfg.title       || '';
          let description = cfg.description || '';
          const siteUrl        = cfg.siteUrl        || '';
          const ogImage        = cfg.ogImage        || '';
          const ogType         = cfg.ogType         || 'website';
          const twitterHandle  = cfg.twitterHandle  || '';
          const twitterCard    = cfg.twitterCard    || 'summary_large_image';
          const locale         = cfg.locale         || 'en';
          const businessName   = (cfg.businessSchema && cfg.businessSchema.name) || '';
          const businessSchema = cfg.businessSchema || null;
          const author         = cfg.author         || businessName || '';
          const publisher      = cfg.publisher      || businessName || '';
          const creator        = cfg.creator        || businessName || '';
          const category       = cfg.category       || '';
          const classification = cfg.classification || '';
          const themeColor     = cfg.themeColor     || '';
          const revisitAfter   = cfg.revisitAfter   || '';
          const robots         = cfg.robots         || 'index, follow';
          const googlebot      = cfg.googlebot      || 'index, follow, max-image-preview:large, max-snippet:-1';
          const keywords       = cfg.keywords       || '';
          const geo            = cfg.geo            || null;

          // Fallback metadata from index.html
          if ((!title || !description) && fs.existsSync('index.html')) {
            const html = fs.readFileSync('index.html', 'utf8');
            if (!title) {
              const m = html.match(/<title>([^<]+)<\/title>/i);
              if (m) title = m[1].trim();
            }
            if (!description) {
              const m = html.match(/<meta[^>]+name=["']description["'][^>]+content=["']([^"']+)["']/i)
                     || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+name=["']description["']/i);
              if (m) description = m[1].trim();
            }
          }
          title = title || 'My App';

          // ── Find global CSS ─────────────────────────────────────────────────
          const cssFile = fs.existsSync('src/index.css') ? '../index.css'
                        : fs.existsSync('src/App.css')   ? '../App.css'
                        : '';

          // ── Build OG/Twitter metadata fields ───────────────────────────────
          const metadataBase = siteUrl ? '\n  metadataBase: new URL(' + JSON.stringify(siteUrl) + '),' : '';
          const titleField = businessName
            ? '\n  title: {\n    default: ' + JSON.stringify(title) + ',\n    template: \'%s | ' + businessName + '\',\n  },'
            : '\n  title: ' + JSON.stringify(title) + ',';
          const descField = '\n  description: ' + JSON.stringify(description) + ',';

          let ogBlock = '';
          if (siteUrl || ogImage) {
            const ogLines = [
              '    type: ' + JSON.stringify(ogType) + ',',
              siteUrl      ? '    url: ' + JSON.stringify(siteUrl) + ','           : '',
              locale       ? '    locale: ' + JSON.stringify(locale) + ','         : '',
              businessName ? '    siteName: ' + JSON.stringify(businessName) + ',' : '',
              '    title: ' + JSON.stringify(title) + ',',
              '    description: ' + JSON.stringify(description) + ',',
              ogImage ? '    images: [{ url: ' + JSON.stringify(ogImage) + ', width: 1200, height: 630 }],' : '',
            ].filter(Boolean).join('\n');
            ogBlock = '\n  openGraph: {\n' + ogLines + '\n  },';
          }

          let twBlock = '';
          if (twitterHandle || ogImage) {
            const twLines = [
              '    card: ' + JSON.stringify(twitterCard) + ',',
              twitterHandle ? '    site: ' + JSON.stringify(twitterHandle) + ',' : '',
              ogImage ? '    images: [' + JSON.stringify(ogImage) + '],' : '',
            ].filter(Boolean).join('\n');
            twBlock = '\n  twitter: {\n' + twLines + '\n  },';
          }

          const canonicalBlock = siteUrl
            ? '\n  alternates: { canonical: ' + JSON.stringify(siteUrl) + ' },' : '';

          const metadataObj =
            '{' + metadataBase + titleField + descField + ogBlock + twBlock + canonicalBlock + '\n}';

          // ── Build JSON-LD ───────────────────────────────────────────────────
          let jsonLdScript = '';
          // If a complete jsonLd object is in config, use it directly
          if (cfg.jsonLd) {
            const ldClean = JSON.parse(JSON.stringify(cfg.jsonLd));
            jsonLdScript = '\n        <script\n          type="application/ld+json"\n' +
              '          dangerouslySetInnerHTML={{ __html: ' + JSON.stringify(JSON.stringify(ldClean)) + ' }}\n' +
              '        />';
          } else if (businessSchema) {
            const ld = {
              '@context': 'https://schema.org',
              '@type': businessSchema.type || 'Organization',
              name: businessSchema.name || title,
              description,
              url: siteUrl || undefined,
              telephone: businessSchema.telephone || undefined,
              areaServed: businessSchema.areaServed || undefined,
              priceRange: businessSchema.priceRange || undefined,
              image: businessSchema.image || ogImage || undefined,
              openingHours: businessSchema.openingHours || undefined,
              sameAs: businessSchema.sameAs || undefined,
            };
            if (businessSchema.address) {
              ld.address = {
                '@type': 'PostalAddress',
                streetAddress: businessSchema.address.streetAddress,
                addressLocality: businessSchema.address.locality,
                addressCountry: businessSchema.address.country,
              };
            }
            // strip undefined keys
            const ldClean = JSON.parse(JSON.stringify(ld));
            jsonLdScript = '\n        <script\n          type="application/ld+json"\n' +
              '          dangerouslySetInnerHTML={{ __html: ' + JSON.stringify(JSON.stringify(ldClean)) + ' }}\n' +
              '        />';
          }

          // ── Read route table ────────────────────────────────────────────────
          const routeData = JSON.parse(fs.readFileSync('/tmp/routes.json', 'utf8'));
          const useFallback = routeData.fallback === true;

          // ── Create src/app/ ─────────────────────────────────────────────────
          fs.mkdirSync('src/app', { recursive: true });

          // ── Build extra <head> tags (geo, keywords, author etc.) ────────────
          // Next.js Metadata API doesn't cover every meta tag.
          // We inject them as <meta> elements directly in the layout <head>.
          const extraMetaTags = [];
          if (robots)         extraMetaTags.push('<meta name="robots" content="' + robots + '" />');
          if (googlebot)      extraMetaTags.push('<meta name="googlebot" content="' + googlebot + '" />');
          if (keywords)       extraMetaTags.push('<meta name="keywords" content="' + keywords + '" />');
          if (author)         extraMetaTags.push('<meta name="author" content="' + author + '" />');
          if (publisher)      extraMetaTags.push('<meta name="publisher" content="' + publisher + '" />');
          if (creator)        extraMetaTags.push('<meta name="creator" content="' + creator + '" />');
          if (category)       extraMetaTags.push('<meta name="category" content="' + category + '" />');
          if (classification) extraMetaTags.push('<meta name="classification" content="' + classification + '" />');
          if (themeColor)     extraMetaTags.push('<meta name="theme-color" content="' + themeColor + '" />');
          if (revisitAfter)   extraMetaTags.push('<meta name="revisit-after" content="' + revisitAfter + '" />');
          if (geo) {
            if (geo.placename) extraMetaTags.push('<meta name="geo.placename" content="' + geo.placename + '" />');
            if (geo.region)    extraMetaTags.push('<meta name="geo.region" content="' + geo.region + '" />');
            if (geo.position)  extraMetaTags.push('<meta name="geo.position" content="' + geo.position + '" />');
            if (geo.ICBM)      extraMetaTags.push('<meta name="ICBM" content="' + geo.ICBM + '" />');
          }
          const extraMetaJsx = extraMetaTags.length
            ? '\n        ' + extraMetaTags.join('\n        ')
            : '';

          // ── layout.tsx ──────────────────────────────────────────────────────
          const layoutLines = [
            "import type { Metadata } from 'next'",
            "import { Toaster } from '@/components/ui/toaster'",
            "import { Toaster as Sonner } from '@/components/ui/sonner'",
            "import { Providers } from './providers'",
          ];
          if (cssFile) layoutLines.push("import '" + cssFile + "'");
          layoutLines.push(
            '',
            'export const metadata: Metadata = ' + metadataObj,
            '',
            '// Polyfill bare `location` for SSR — some components reference location.href',
            '// without window guard. This prevents "location is not defined" crashes.',
            "if (typeof globalThis.location === 'undefined') {",
            "  (globalThis as any).location = {",
            "    href: '', pathname: '/', search: '', hash: '',",
            "    host: '', hostname: '', origin: '', protocol: 'https:',",
            "    assign: () => {}, replace: () => {}, reload: () => {},",
            "  }",
            '}',
            '',
            'export default function RootLayout({ children }: { children: React.ReactNode }) {',
            '  return (',
            '    <html lang="' + locale + '">',
            '      <head>' + extraMetaJsx + '\n      </head>',
            '      <body>' + jsonLdScript,
            '        <div id="root">',
            '          <Providers>',
            '            <Toaster />',
            '            <Sonner />',
            '            {children}',
            '          </Providers>',
            '        </div>',
            '      </body>',
            '    </html>',
            '  )',
            '}',
            ''
          );
          fs.writeFileSync('src/app/layout.tsx', layoutLines.join('\n'));

          // ── providers.tsx ───────────────────────────────────────────────────
          fs.writeFileSync('src/app/providers.tsx', [
            "'use client'",
            "import { QueryClient, QueryClientProvider } from '@tanstack/react-query'",
            "import { useState } from 'react'",
            '',
            'export function Providers({ children }: { children: React.ReactNode }) {',
            '  const [queryClient] = useState(() => new QueryClient())',
            '  return (',
            '    <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>',
            '  )',
            '}',
            '',
          ].join('\n'));

          if (useFallback) {
            // ── FALLBACK: [[...slug]] catch-all ────────────────────────────
            // FIX 3: ssr:false removed — App renders server-side in fallback too
            console.warn('WARNING: Using fallback catch-all — routes not extracted from App.tsx');
            const appEntry = fs.existsSync('src/App.tsx') ? '../../App' : '../../app';
            fs.mkdirSync('src/app/[[...slug]]', { recursive: true });
            fs.writeFileSync('src/app/[[...slug]]/page.tsx', [
              "import { ClientOnly } from './client'",
              "export function generateStaticParams() { return [{ slug: [''] }] }",
              'export default function Page() { return <ClientOnly /> }',
              '',
            ].join('\n'));
            // FIX 3: Removed { ssr: false } from dynamic() in fallback
            fs.writeFileSync('src/app/[[...slug]]/client.tsx', [
              "'use client'",
              "import dynamic from 'next/dynamic'",
              '',
              "// SSR enabled — content is pre-rendered and visible to Google",
              "const App = dynamic(() => import('" + appEntry + "'))",
              '',
              'export function ClientOnly() { return <App /> }',
              '',
            ].join('\n'));
          } else {
            // ── INDIVIDUAL PAGE FILES (real SSR) ──────────────────────────
            const { routes, notFound } = routeData;

            for (const route of routes) {
              // Calculate relative import path from src/app/[route-dir]/ to src/routes/
              // Route importSrc is like "./pages/Index" or "./pages/services/Motor"
              // After Fix H runs, src/pages → src/routes, so we substitute that.
              const importRelPath = route.importSrc.replace(/^\.\/pages\//, '');
              // Convert React Router dynamic segments (:param) → Next.js bracket syntax ([param])
              const segments = route.path.split('/').filter(Boolean).map(s => s.startsWith(':') ? '[' + s.slice(1) + ']' : s);
              const depth = segments.length + 1; // +1 for the src/app/ prefix itself
              const relImport = '../'.repeat(depth) + 'routes/' + importRelPath;

              const pageDir = route.path === '/'
                ? 'src/app'
                : path.join('src/app', ...segments);
              fs.mkdirSync(pageDir, { recursive: true });

              const componentName = route.component + 'Page';
              // Check for per-page metadata in lovable.migrate.json
              const pagesMeta = cfg.pages && cfg.pages[route.path];
              // Per-page metadata — includes keywords, robots, googlebot if set
              const pageKeywords = pagesMeta && pagesMeta.keywords ? pagesMeta.keywords : '';
              const pageRobots   = pagesMeta && pagesMeta.robots   ? pagesMeta.robots   : '';
              const pageGooglebot= pagesMeta && pagesMeta.googlebot? pagesMeta.googlebot: '';
              let pageMetaFields = '';
              if (pagesMeta && pagesMeta.title)       pageMetaFields += '\n  title: ' + JSON.stringify(pagesMeta.title) + ',';
              if (pagesMeta && pagesMeta.description) pageMetaFields += '\n  description: ' + JSON.stringify(pagesMeta.description) + ',';
              if (pageKeywords)  pageMetaFields += '\n  keywords: ' + JSON.stringify(pageKeywords) + ',';
              if (pageRobots)    pageMetaFields += '\n  robots: ' + JSON.stringify(pageRobots) + ',';
              const pageMeta = pageMetaFields
                ? '\nexport const metadata: Metadata = {' + pageMetaFields + '\n}\n'
                : '';
              const metadataImport = pagesMeta ? "import type { Metadata } from 'next'" : '';

              // Two-file pattern: server page.tsx (exports metadata) + 'use client' _client.tsx
              // page.tsx   — server component, exports per-page metadata, visible to Google
              // _client.tsx — 'use client', handles interactivity
              //
              // FIX 2: { ssr: false } removed from dynamic() — content now pre-rendered
              const dynName = route.component + 'Dynamic';
              const clientName = route.component + 'Client';

              // _client.tsx — direct import for SSR pages (no dynamic())
              // Using direct import ensures Next.js renders content server-side
              // so Google sees the full HTML body, not a blank page.
              fs.writeFileSync(path.join(pageDir, '_client.tsx'), [
                "'use client'",
                "import " + route.component + " from '" + relImport + "'",
                '',
                'export function ' + clientName + '() {',
                '  return <' + route.component + ' />',
                '}',
                '',
              ].join('\n'));

              // page.tsx — server component, exports per-page metadata, renders client wrapper
              const pageLines = [];
              if (metadataImport) pageLines.push(metadataImport);
              pageLines.push("import { " + clientName + " } from './_client'");
              if (pageMeta.trim()) {
                pageLines.push('');
                pageLines.push(pageMeta.trim());
              }
              pageLines.push('');
              pageLines.push('export default function ' + componentName + '() {');
              pageLines.push('  return <' + clientName + ' />');
              pageLines.push('}', '');
              fs.writeFileSync(path.join(pageDir, 'page.tsx'), pageLines.join('\n'));
              console.log('Created page: ' + pageDir + '/page.tsx -> ' + relImport);
            }

            // ── not-found.tsx (two-file pattern) ─────────────────────────
            if (notFound && notFound.importSrc) {
              const nfRelPath = notFound.importSrc.replace(/^\.\/pages\//, '');
              const nfDynName = notFound.component + 'Dynamic';
              const nfClientName = notFound.component + 'Client';
              // Direct import for not-found — no dynamic() needed
              fs.writeFileSync('src/app/_not-found-client.tsx', [
                "'use client'",
                "import " + notFound.component + " from '../routes/" + nfRelPath + "'",
                '',
                'export function ' + nfClientName + '() {',
                '  return <' + notFound.component + ' />',
                '}',
                '',
              ].join('\n'));
              // not-found.tsx — server component, renders client wrapper
              fs.writeFileSync('src/app/not-found.tsx', [
                "import { " + nfClientName + " } from './_not-found-client'",
                '',
                'export default function NotFoundPage() {',
                '  return <' + nfClientName + ' />',
                '}',
                '',
              ].join('\n'));
              console.log('Created src/app/not-found.tsx (two-file pattern)');
            }
          }

          // ── Update package.json ─────────────────────────────────────────────
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.dependencies = pkg.dependencies || {};
          // FIX 1: Was ^16.0.0 (non-existent). Now ^15.3.0 (latest stable).
          pkg.dependencies['next'] = '^15.3.0';
          pkg.scripts = pkg.scripts || {};
          pkg.scripts['dev']   = 'next dev';
          pkg.scripts['build'] = 'next build';
          pkg.scripts['start'] = 'next start';
          pkg.scripts['lint']  = 'next lint';
          // Remove Vite-specific scripts that conflict with Next.js
          delete pkg.scripts['build:dev'];
          delete pkg.scripts['preview'];
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));

          console.log('Migration complete — Next.js 15.3.0, SSR ENABLED on all pages');
          NODEJS

      # ─── FIX A: Remove stale --no-turbo CLI flag ──────────────────────────────
      - name: "Fix A — Remove stale --no-turbo flag from package.json"
        if: steps.check_flag.outputs.enabled == 'true'
        run: sed -i 's/ --no-turbo//g' package.json

      # ─── FIX H: Rename src/pages → src/routes ───────────────────────────────
      # Prevents Next.js treating Vite page components as Pages Router pages.
      - name: "Fix H — Rename src/pages → src/routes"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          if [ -d "src/pages" ]; then
            # Remove stale src/routes/ if it already exists (e.g. from a previous Claude Code
            # session that committed migration artifacts back to main). Without this, `mv` would
            # nest src/pages inside src/routes/pages/ instead of replacing it.
            rm -rf src/routes
            mv src/pages src/routes
            find src -type f \( -name "*.tsx" -o -name "*.ts" -o -name "*.jsx" -o -name "*.js" \) \
              -not -path "*/node_modules/*" | while read -r file; do
              if grep -q '/pages/' "$file"; then
                sed -i 's|/pages/|/routes/|g' "$file"
                echo "Updated imports in: $file"
              fi
            done
            echo "Renamed src/pages -> src/routes"
          fi

      # ─── FIX B: Inject "use client" ──────────────────────────────────────────
      - name: "Fix B — Inject 'use client' into client components"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          // Matches React built-in hooks AND any custom hook call (use[A-Z]...).
          // This ensures files like toaster.tsx (which calls useToast()) get
          // 'use client' even though they don't directly call useState/useEffect.
          const CLIENT_HOOKS = /\b(useState|useEffect|useRef|useCallback|useMemo|useContext|useReducer|useLayoutEffect|useImperativeHandle|useDebugValue|useDeferredValue|useId|useInsertionEffect|useSyncExternalStore|useTransition)\b|\buse[A-Z]\w*\s*\(/;

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (['node_modules', '.next', 'dist'].includes(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (/\.(tsx|ts)$/.test(entry.name)) inject(full);
            }
          }

          function inject(file) {
            const src = fs.readFileSync(file, 'utf8');
            if (src.includes('"use client"') || src.includes("'use client'")) return;
            if (!CLIENT_HOOKS.test(src)) return;
            fs.writeFileSync(file, '"use client";\n' + src);
            console.log('Added "use client": ' + file);
          }

          walk('src');
          NODEJS

      # ─── FIX C2: Rewrite NavLink.tsx ─────────────────────────────────────────
      # NavLink.tsx uses a combined alias import from react-router-dom that Fix C's
      # sed patterns cannot handle. Full rewrite to next/link + usePathname.
      - name: "Fix C2 — Rewrite NavLink.tsx to next/link + usePathname"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs = require('fs');
          const p = 'src/components/NavLink.tsx';
          if (!fs.existsSync(p)) { console.log('NavLink.tsx not found — skipping'); process.exit(0); }
          const src = fs.readFileSync(p, 'utf8');
          if (!src.includes('react-router-dom')) { console.log('NavLink.tsx already migrated — skipping'); process.exit(0); }

          fs.writeFileSync(p, [
            "'use client'",
            "import Link from 'next/link'",
            "import { usePathname } from 'next/navigation'",
            "import { forwardRef } from 'react'",
            "import { cn } from '@/lib/utils'",
            "import type { AnchorHTMLAttributes } from 'react'",
            '',
            "interface NavLinkCompatProps extends Omit<AnchorHTMLAttributes<HTMLAnchorElement>, 'href'> {",
            '  to: string',
            '  className?: string',
            '  activeClassName?: string',
            '}',
            '',
            'const NavLink = forwardRef<HTMLAnchorElement, NavLinkCompatProps>(',
            '  ({ className, activeClassName, to, ...props }, ref) => {',
            '    const pathname = usePathname()',
            "    const isActive = pathname === to || (to !== '/' && pathname.startsWith(to))",
            '    return (',
            '      <Link',
            '        ref={ref}',
            '        href={to}',
            '        className={cn(className, isActive && activeClassName)}',
            '        {...props}',
            '      />',
            '    )',
            '  },',
            ')',
            '',
            "NavLink.displayName = 'NavLink'",
            '',
            'export { NavLink }',
            '',
          ].join('\n'));
          console.log('Rewrote NavLink.tsx -> next/link + usePathname');
          NODEJS

      # ─── FIX C: Replace remaining react-router-dom single imports ────────────
      - name: "Fix C — Replace remaining react-router-dom imports"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          find src -type f \( -name "*.tsx" -o -name "*.ts" \) | while read -r file; do
            grep -q 'react-router-dom' "$file" || continue

            sed -i "s|import { Link } from 'react-router-dom'|import Link from 'next/link'|g" "$file"
            sed -i 's|import { Link } from "react-router-dom"|import Link from '"'"'next/link'"'"'|g' "$file"
            sed -i 's|<Link to=|<Link href=|g' "$file"

            sed -i "s|import { useNavigate } from 'react-router-dom'|import { useRouter } from 'next/navigation'|g" "$file"
            sed -i 's|import { useNavigate } from "react-router-dom"|import { useRouter } from '"'"'next/navigation'"'"'|g' "$file"
            sed -i "s|const navigate = useNavigate()|const router = useRouter()|g" "$file"
            sed -i 's|\bnavigate(|router.push(|g' "$file"

            sed -i "s|import { useLocation } from 'react-router-dom'|import { usePathname } from 'next/navigation'|g" "$file"
            sed -i 's|import { useLocation } from "react-router-dom"|import { usePathname } from '"'"'next/navigation'"'"'|g' "$file"
            sed -i "s|const location = useLocation()|const pathname = usePathname()|g" "$file"
            sed -i 's|\blocation\.pathname\b|pathname|g' "$file"

            echo "Processed: $file"
          done

      # ─── FIX C3: Handle combined react-router-dom imports ───────────────────
      - name: "Fix C3 — Handle combined react-router-dom imports and missed usage patterns"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          node - <<'NODEJS'
          const fs   = require('fs');
          const path = require('path');

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (['node_modules', '.next', 'dist', 'app'].includes(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (/\.(tsx|ts)$/.test(entry.name)) processFile(full);
            }
          }

          function processFile(file) {
            let src = fs.readFileSync(file, 'utf8');
            const orig = src;

            if (src.includes('react-router-dom')) {
              src = src.replace(
                /import\s*\{([^}]+)\}\s*from\s*["']react-router-dom["'];?/g,
                (match, names) => {
                  const parts = names.split(',').map(n => n.trim()).filter(Boolean);
                  const lines = [];
                  const nextNavImports = [];
                  const remaining = [];
                  for (const name of parts) {
                    switch (name) {
                      case 'Link':             lines.push("import Link from 'next/link'"); break;
                      case 'useLocation':      nextNavImports.push('usePathname'); break;
                      case 'useNavigate':      nextNavImports.push('useRouter'); break;
                      case 'useSearchParams':  nextNavImports.push('useSearchParams'); break;
                      case 'useParams':        nextNavImports.push('useParams'); break;
                      default:                 remaining.push(name);
                    }
                  }
                  if (nextNavImports.length) lines.push("import { " + nextNavImports.join(', ') + " } from 'next/navigation'");
                  if (remaining.length)      lines.push("import { " + remaining.join(', ') + " } from 'react-router-dom'");
                  return lines.join('\n');
                }
              );
            }

            src = src.replace(/const\s*\{\s*pathname\s*\}\s*=\s*useLocation\s*\(\)/g, 'const pathname = usePathname()');
            src = src.replace(/const\s*\[\s*(\w+)\s*\]\s*=\s*useSearchParams\s*\(\)/g, 'const $1 = useSearchParams()');
            src = src.replace(/(<Link\b[^>]*?)\bto=/gs, '$1href=');

            if (src !== orig) {
              fs.writeFileSync(file, src);
              console.log('Fix C3 — updated: ' + file);
            }
          }

          walk('src');
          NODEJS

      # ─── FIX D: Strip BrowserRouter ──────────────────────────────────────────
      - name: "Fix D — Remove BrowserRouter"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          find src -type f -name "*.tsx" | while read -r file; do
            grep -q 'BrowserRouter' "$file" || continue
            sed -i 's/,\s*BrowserRouter\b//g' "$file"
            sed -i 's/\bBrowserRouter\s*,\s*//g' "$file"
            sed -i 's/{ BrowserRouter }//g' "$file"
            sed -i 's|<BrowserRouter>||g; s|</BrowserRouter>||g' "$file"
            echo "Removed BrowserRouter from: $file"
          done

      # ─── FIX F: Rename .jfif → .jpg ──────────────────────────────────────────
      - name: "Fix F — Rename .jfif image files to .jpg"
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          find . -name "*.jfif" \
            -not -path "*/node_modules/*" \
            -not -path "*/.next/*" \
            -not -path "*/dist/*" | while read -r f; do
            mv "$f" "${f%.jfif}.jpg"
            echo "Renamed: $f"
          done
          find src public -type f \
